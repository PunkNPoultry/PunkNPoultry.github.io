{% assign letterstring = "a,b,c,d,e,f,g,h,i,j,k,l,m,n" %}
{% assign letters = letterstring | split: ',' %}
{% assign number = include.number | minus: 1 %}
<section aria-label="Image carousel">
    <wa-carousel navigation pagination {% if include.duration %}autoplay autoplay-interval="{{ include.duration | times: 1000 }}"{% endif %}>
        {% for item in page.carousels[number].images %}
        <wa-carousel-item>
            <img src="{{ item }}" alt="Carousel image {{ forloop.index }}">
        </wa-carousel-item>
        {% endfor %}
    </wa-carousel>
</section>
